name: Update Google Scholar Metrics

on:
  # Run automatically every day at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Create fetching script
        run: |
          cat > fetch_metrics.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            try {
              const page = await browser.newPage();
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');

              console.log('Fetching Google Scholar profile...');
              await page.goto('https://scholar.google.com/citations?user=tMmhq2MAAAAJ&hl=en', {
                waitUntil: 'networkidle2',
                timeout: 30000
              });

              // Wait for metrics table to load
              await page.waitForSelector('.gsc_rsb_std', { timeout: 10000 });

              // Extract metrics
              const metrics = await page.evaluate(() => {
                const cells = Array.from(document.querySelectorAll('.gsc_rsb_std'));
                return {
                  citations: parseInt(cells[0]?.textContent || '0'),
                  h_index: parseInt(cells[1]?.textContent || '0'),
                  i10_index: parseInt(cells[2]?.textContent || '0')
                };
              });

              console.log('Metrics fetched:', metrics);

              // Save to file
              fs.writeFileSync('data/metrics.json', JSON.stringify(metrics, null, 2));
              console.log('✓ Metrics saved to data/metrics.json');

              await browser.close();
              process.exit(0);
            } catch (error) {
              console.error('Error:', error.message);
              await browser.close();
              process.exit(1);
            }
          })();
          EOF

      - name: Fetch Scholar metrics
        run: node fetch_metrics.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/metrics.json
          if git diff --staged --quiet; then
            echo "No changes to metrics"
          else
            git commit -m "chore: update Google Scholar metrics [skip ci]"
            git push
            echo "✓ Metrics updated and pushed"
          fi
